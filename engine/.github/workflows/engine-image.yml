name: Build engine image

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/engine-image.yml"
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Bake the commit SHA into the image so /ops/runs can show which
      # engine version produced a given audit log row.
      - name: Stamp .git-sha
        run: echo "${{ github.sha }}" > .git-sha

      - name: Build + push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/alchemy-engine:latest
            ghcr.io/${{ github.repository_owner }}/alchemy-engine:${{ github.sha }}

      - name: Summary
        run: |
          echo "### Pushed" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository_owner }}/alchemy-engine:latest" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository_owner }}/alchemy-engine:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
