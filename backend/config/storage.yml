test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Production object storage. Reuses the AWS credentials Kamal already sets
# in the prod env (used elsewhere for SES/SNS). Bucket name override-able
# via ACTIVE_STORAGE_S3_BUCKET so dev / staging / prod don't share buckets
# if you split them later.
amazon:
  service: S3
  access_key_id: <%= ENV["AWS_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["AWS_SECRET_ACCESS_KEY"] %>
  region: <%= ENV.fetch("AWS_REGION", "us-east-1") %>
  bucket: <%= ENV.fetch("ACTIVE_STORAGE_S3_BUCKET", "alchemy-prod") %>
