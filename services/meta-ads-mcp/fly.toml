# Shared self-hosted Meta Ads MCP. Reachable by agent engines over Fly's
# private network at sentrel-meta-mcp.internal:8080 — not publicly exposed.
app = "sentrel-meta-mcp"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
