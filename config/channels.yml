web:
  label: "Web Chat"
  icon: "message-square"
  description: "Chat from the dashboard"
  always_available: true
  fields: {}

email:
  label: "Email"
  icon: "mail"
  description: "Own email address via AWS SES"
  fields:
    address:
      type: string
      label: "Email Address"
      placeholder: "sarah-sdr@team.company.com"
      required: true

whatsapp:
  label: "WhatsApp"
  icon: "phone"
  description: "Send and receive via Twilio WhatsApp"
  coming_soon: true
  fields:
    phone_number:
      type: string
      label: "Twilio Phone Number"
      placeholder: "+14155238886"
      required: true
      hint: "Your Twilio WhatsApp-enabled number. Set the webhook URL to your-domain/webhooks/whatsapp in Twilio console."

sms:
  label: "SMS"
  icon: "message-circle"
  description: "Send and receive SMS via Twilio"
  coming_soon: true
  fields:
    phone_number:
      type: string
      label: "Twilio Phone Number"
      placeholder: "+15550101"
      required: true
      hint: "Same Twilio number. Set the SMS webhook URL to your-domain/webhooks/sms in Twilio console."

slack:
  label: "Slack"
  icon: "hash"
  description: "Appears in your Slack workspace"
  coming_soon: true
  fields:
    display_name:
      type: string
      label: "Display Name"
      placeholder: "Sarah SDR"
      required: true
    bot_token:
      type: string
      label: "Bot Token"
      sensitive: true

telegram:
  label: "Telegram"
  icon: "send"
  description: "Own Telegram bot"
  fields:
    bot_username:
      type: string
      label: "Bot Username"
      placeholder: "sarah_sdr_bot"
      required: true
    bot_token:
      type: string
      label: "Bot Token"
      sensitive: true
