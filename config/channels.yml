web:
  label: "Web Chat"
  icon: "message-square"
  description: "Chat from the dashboard"
  always_available: true
  fields: {}

email:
  label: "Email"
  icon: "mail"
  description: "Own email address via AWS SES"
  fields:
    address:
      type: string
      label: "Email Address"
      placeholder: "sarah-sdr@team.company.com"
      required: true

whatsapp:
  label: "WhatsApp"
  icon: "phone"
  description: "Own WhatsApp number via Twilio"
  fields:
    phone_number:
      type: string
      label: "Phone Number"
      placeholder: "+15550101"
      required: true

sms:
  label: "SMS"
  icon: "message-circle"
  description: "Same Twilio number, SMS channel"
  fields:
    phone_number:
      type: string
      label: "Phone Number"
      placeholder: "+15550101"
      required: true

slack:
  label: "Slack"
  icon: "hash"
  description: "Appears in your Slack workspace"
  fields:
    display_name:
      type: string
      label: "Display Name"
      placeholder: "Sarah SDR"
      required: true
    bot_token:
      type: string
      label: "Bot Token"
      sensitive: true

telegram:
  label: "Telegram"
  icon: "send"
  description: "Own Telegram bot"
  fields:
    bot_username:
      type: string
      label: "Bot Username"
      placeholder: "sarah_sdr_bot"
      required: true
    bot_token:
      type: string
      label: "Bot Token"
      sensitive: true
